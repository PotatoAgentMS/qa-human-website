<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Human Quality Tracker</title>
<style>
  :root {
    --bg: #f4f6fb; --panel: #ffffff; --ink: #1c2433; --muted: #687288; --line: #e3e8f0;
    --accent: #3b5bdb; --accent-soft: #e8edff; --good: #2f9e63; --warn: #d98a00;
    --bad: #d6435b; --crit: #c92a4a;
    --shadow: 0 1px 2px rgba(20,30,50,.06), 0 4px 16px rgba(20,30,50,.06); --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.45; }
  a { color: var(--accent); }
  button { font-family: inherit; font-size: 13px; cursor: pointer; border: 1px solid var(--line); background: var(--panel); color: var(--ink); padding: 7px 12px; border-radius: 8px; transition: background .12s, border-color .12s; }
  button:hover { background: #f0f3fa; }
  button:disabled { opacity: .5; cursor: default; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: #2f4ac0; }
  button.danger { color: var(--bad); border-color: #f2c3cc; }
  button.danger:hover { background: #fdeef1; }
  button.ghost { border-color: transparent; background: transparent; }
  button.small { padding: 4px 8px; font-size: 12px; }
  input, select, textarea { font-family: inherit; font-size: 13px; color: var(--ink); background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; width: 100%; }
  textarea { resize: vertical; min-height: 60px; }
  label.field { display: block; }
  label.field > span { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
  header.top { background: var(--panel); border-bottom: 1px solid var(--line); padding: 14px 24px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 20; }
  header.top .brand { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 9px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--accent); display: inline-block; }
  header.top .meta { color: var(--muted); font-size: 12px; }
  header.top .spacer { flex: 1; }
  header.top .actions { display: flex; gap: 8px; align-items: center; }
  nav.tabs { display: flex; gap: 4px; padding: 0 24px; background: var(--panel); border-bottom: 1px solid var(--line); position: sticky; top: 57px; z-index: 15; overflow-x: auto; }
  nav.tabs .tab { padding: 11px 14px; font-size: 13px; font-weight: 600; color: var(--muted); border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; }
  nav.tabs .tab:hover { color: var(--ink); }
  nav.tabs .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  main { padding: 22px 24px 60px; max-width: 1500px; margin: 0 auto; }
  h2.view-title { margin: 0 0 4px; font-size: 19px; }
  .view-sub { color: var(--muted); margin: 0 0 18px; font-size: 13px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; margin-bottom: 18px; }
  .panel h3 { margin: 0 0 14px; font-size: 15px; }
  .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 14px; }
  .kpi { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
  .kpi .label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
  .kpi .value { font-size: 30px; font-weight: 700; margin-top: 6px; }
  .kpi .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px,1fr)); gap: 16px; }
  .bar-row { display: grid; grid-template-columns: 150px 1fr 42px; align-items: center; gap: 10px; margin-bottom: 9px; }
  .bar-row .bl { font-size: 12.5px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { background: #eef1f7; border-radius: 6px; height: 16px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; background: var(--accent); }
  .bar-num { font-size: 12.5px; text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); }
  .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; align-items: end; }
  .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); }
  table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  th, td { text-align: left; padding: 9px 11px; border-bottom: 1px solid var(--line); vertical-align: top; }
  th { background: #f7f9fd; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); position: sticky; top: 0; white-space: nowrap; cursor: pointer; }
  th:hover { color: var(--ink); }
  tbody tr:hover { background: #fafbff; }
  td.wrap { max-width: 240px; white-space: normal; }
  td .actions { display: flex; gap: 6px; }
  .chip { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .chip.crit { background: #fde7ec; color: var(--crit); }
  .chip.major { background: #fdf0db; color: var(--warn); }
  .chip.minor { background: #e7f3ee; color: var(--good); }
  .chip.neutral { background: #eef1f7; color: var(--muted); }
  .chip.open { background: #fde7ec; color: var(--bad); }
  .chip.progress { background: #e8edff; color: var(--accent); }
  .chip.monitoring { background: #fdf0db; color: var(--warn); }
  .chip.resolved, .chip.closed { background: #e7f3ee; color: var(--good); }
  .empty { text-align: center; padding: 48px 16px; color: var(--muted); }
  .empty .big { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  .overlay { position: fixed; inset: 0; background: rgba(20,28,45,.45); display: flex; align-items: flex-start; justify-content: center; padding: 30px 16px; z-index: 50; overflow-y: auto; }
  .modal { background: var(--panel); border-radius: 14px; width: 100%; max-width: 820px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
  .modal-head { display: flex; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--line); }
  .modal-head h3 { margin: 0; font-size: 16px; }
  .modal-body { padding: 20px; }
  .modal-foot { padding: 14px 20px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .form-grid .span2 { grid-column: span 2; }
  .form-grid .span3 { grid-column: span 3; }
  .hint { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .toolbar .spacer { flex: 1; }
  .count-pill { background: var(--accent-soft); color: var(--accent); font-weight: 600; border-radius: 999px; padding: 3px 10px; font-size: 12px; }
  .tag-edit-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .tag-edit-row input { flex: 1; }
  .cat-card { border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
  .cat-card .ttl { font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .cat-card textarea { margin-top: 8px; }
  .pattern-item { border-left: 3px solid var(--accent); padding: 10px 14px; background: #fafbff; border-radius: 0 8px 8px 0; margin-bottom: 10px; }
  .pattern-item .pi-top { display: flex; align-items: center; gap: 8px; }
  .pattern-item .pi-cat { font-weight: 700; }
  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: #1c2433; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; box-shadow: var(--shadow); z-index: 100; opacity: 0; transition: opacity .2s; pointer-events: none; max-width: 90vw; }
  .toast.show { opacity: 1; }
  .inline-note { font-size: 12px; color: var(--muted); }
  .section-actions { display:flex; gap:8px; flex-wrap: wrap; }
  /* login */
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); padding: 30px; width: 100%; max-width: 380px; }
  .login-card h1 { font-size: 19px; margin: 0 0 4px; display: flex; align-items: center; gap: 9px; }
  .login-card p { color: var(--muted); margin: 0 0 18px; font-size: 13px; }
  .login-err { color: var(--bad); font-size: 12.5px; margin-top: 10px; min-height: 16px; }
  .loading { text-align: center; padding: 80px 16px; color: var(--muted); }
  /* QA Bible (knowledge base) */
  .kb-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .kb-search { max-width: 440px; }
  .kb-wrap { display: flex; gap: 18px; align-items: flex-start; }
  .kb-side { width: 244px; flex: 0 0 244px; }
  .kb-side-title { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 700; margin: 2px 0 8px; }
  .kb-nav-item { padding: 8px 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; border: 1px solid transparent; }
  .kb-nav-item:hover { background: #f0f3fa; }
  .kb-nav-item.active { background: var(--accent-soft); border-color: #d6def9; }
  .kb-nav-item .t { font-weight: 600; font-size: 13px; }
  .kb-main { flex: 1; min-width: 0; }
  .kb-sec-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .kb-card { border: 1px solid var(--line); border-radius: 10px; margin-bottom: 10px; background: #fff; overflow: hidden; }
  .kb-card-head { display: flex; align-items: center; gap: 8px; padding: 11px 13px; cursor: pointer; }
  .kb-card-head:hover { background: #fafbff; }
  .kb-chev { color: var(--muted); font-size: 11px; width: 10px; flex: 0 0 10px; }
  .kb-card-title { font-weight: 600; }
  .kb-card-body { padding: 6px 14px 14px 33px; border-top: 1px solid var(--line); }
  .kb-card-actions { margin-top: 10px; }
  .kb-updated { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .kb-group-title { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--accent); font-weight: 700; margin: 16px 0 8px; }
  .kb-head-controls { display: flex; gap: 6px; }
  .kb-tag { font-size: 11px; background: #eef1f7; color: var(--muted); border-radius: 999px; padding: 2px 8px; white-space: nowrap; }
  .kb-ul { margin: 6px 0; padding-left: 20px; }
  .kb-ul li { margin: 2px 0; }
  .kb-p { margin: 7px 0; }
  .kb-sub { font-weight: 700; margin: 10px 0 2px; }
  .kb-sp { height: 8px; }
  .kb-result-sec { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 700; margin: 12px 0 4px; }
  @media (max-width: 760px) { .kb-wrap { flex-direction: column; } .kb-side { width: 100%; flex: 1 1 auto; } }
</style>
</head>
<body>
<div id="app"></div>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";

/* ------------------------------ App state -------------------------------- */
let pass = sessionStorage.getItem("qa_pass") || null;
let state = { entries: [], patterns: [], fixes: [], config: null };
let activeTab = "dashboard";
let filters = { from: "", to: "", reviewer: "", agent: "", environment: "", category: "", severity: "", status: "", q: "" };
let sortKey = "dateReviewed";
let sortDir = -1;
let busy = false;

const BIBLE_NOW = "2026-06-26T00:00:00.000Z";
function bslug(t) { return String(t).toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, ""); }
function bdef(group, title, body, order) { return { id: "bd_" + bslug(title), title, body, group, order, lastUpdated: BIBLE_NOW, updatedBy: "QA Team" }; }
function bitem(title, body, order) { return { id: "bi_" + bslug(title), title, body, order, lastUpdated: BIBLE_NOW, updatedBy: "QA Team" }; }

const DEFAULT_BIBLE = {
  sections: [
    {
      id: "sec_blocks", title: "Block Definitions", tag: "Workflow Blocks", kind: "definitions", order: 0,
      lastUpdated: BIBLE_NOW, updatedBy: "QA Team",
      intro: "Definitions of the workflow blocks used to build call flows, grouped by when they run.",
      items: [
        bdef("Core Blocks", "Start Flow", `The entry point. Every workflow has one. It defines when a flow triggers, how it's entered (primary vs. conditional), and on which channels (inbound, outbound, SMS). It doesn't speak to the caller.`, 0),
        bdef("Core Blocks", "Talk", `The "prompt" block. You give the AI instructions/objectives and it has a natural back-and-forth conversation, gathering info and moving on when exit conditions are met. The workhorse for conversational steps.`, 1),
        bdef("Core Blocks", "Collect", `A mini-form inside the conversation. Gathers multiple pieces of info in sequence (name, email, phone, etc.) conversationally, storing each as a variable. Cleaner than stacking multiple ask blocks.`, 2),
        bdef("Core Blocks", "Ask Exactly", `Asks one precise, required question at an exact moment with strict validation. Admin-only. Use sparingly — overuse makes the flow feel like a rigid IVR.`, 3),
        bdef("Core Blocks", "Filter", `The routing-logic layer. Routes the call based on cases (where the call can go) and conditions (when it's allowed to go there). Evaluates top-to-bottom, first match wins, else = fallback.`, 4),
        bdef("Core Blocks", "Time Filter", `A time-of-day gatekeeper. Routes down different paths (True/False) based on whether the current time falls inside defined ranges — business hours, lunch breaks, after-hours.`, 5),
        bdef("Core Blocks", "End Call", `Gracefully ends the call with a closing message. Can also generate a call summary, set outcome tags for analytics, send a follow-up SMS, and trigger post-call actions.`, 6),
        bdef("Pre-Call Actions (run after answer, before the agent speaks)", "Pre-Call API Request", `Calls external APIs the moment a call starts to load customer data, verify callers, or prep variables before the greeting.`, 7),
        bdef("Pre-Call Actions (run after answer, before the agent speaks)", "Pre-Call Code", `Runs custom Python before the conversation to transform data, evaluate conditions, or generate variables for the greeting/routing.`, 8),
        bdef("Pre-Call Actions (run after answer, before the agent speaks)", "Pre-Call Webhook", `Lets external systems (CRMs, IVRs) push preloaded caller context into Phonely so the agent starts fully aware — skips questions, routes instantly.`, 9),
        bdef("Pre-Call Actions (run after answer, before the agent speaks)", "Pre-Call Filter", `Branches the call into the correct Start Flow path based on conditions (caller metadata, prior pre-call outputs) before the agent speaks.`, 10),
        bdef("Pre-Call Actions (run after answer, before the agent speaks)", "Pre-Call End Call", `Ends a call early, before the main workflow, when a caller isn't eligible or shouldn't continue (often paired with a pre-call filter/code/API check).`, 11),
        bdef("Live Call Actions (run in real time, mid-conversation)", "API Request", `Real-time HTTP calls to external systems during the call: create CRM records, check availability, trigger webhooks/automations (Zapier, Make, Slack).`, 12),
        bdef("Live Call Actions (run in real time, mid-conversation)", "Run Code", `Executes Python mid-call as a logic layer between conversational steps — compute values, make complex conditional decisions.`, 13),
        bdef("Live Call Actions (run in real time, mid-conversation)", "Transfer Call", `Hands a live call off to a person/department/fallback. Supports warm + cold transfers, AI triage, multi-destination failover/retry, and custom hold experiences — all in one block.`, 14),
        bdef("Live Call Actions (run in real time, mid-conversation)", "Transfer Flow", `Routes the caller from the current flow to one or more sub-flows without ending the call. Seamless context switch behind the scenes; supports multiple destinations and global transition conditions.`, 15),
        bdef("Live Call Actions (run in real time, mid-conversation)", "Collect Payments", `Securely collects/processes card payments mid-call (keypad or spoken). Fully PCI-compliant, isolated environment, returns to the flow after. Admin-only.`, 16),
        bdef("Live Call Actions (run in real time, mid-conversation)", "Send SMS", `Sends a text from Phonely's number (or your verified number) to the caller mid-call — confirmations, links, reference numbers, next steps. Supports variables.`, 17),
        bdef("Live Call Actions (run in real time, mid-conversation)", "Send Email", `Sends an automated email during the call (or post-call) — follow-ups, lead notifications, call details to your team. Supports variables and HTML.`, 18),
        bdef("Post-Call Actions (run after the call ends)", "Post-Call Overview", `Not a block itself, but the category: automations that fire after the call with access to rich data (AI summary, full transcript, call URL, analytics, all variables). Can be placed on the Start node to fire even if the caller doesn't finish.`, 19),
        bdef("Post-Call Actions (run after the call ends)", "Post-Call Send Email", `Sends an email after the call — summaries, confirmations, receipts, next steps.`, 20),
        bdef("Post-Call Actions (run after the call ends)", "Send Call Data", `Pushes call details (caller info, duration, outcomes, workflow data) to an external system via webhook — for CRMs, dashboards, Zapier/custom APIs.`, 21),
        bdef("Post-Call Actions (run after the call ends)", "SMS & Email Notifications", `Sends call summaries/notifications to your team (not the caller) after a call ends.`, 22),
        bdef("Post-Call Actions (run after the call ends)", "Connect to Make", `Pushes call data to Make (Integromat) via webhook to trigger scenarios and receive structured responses back.`, 23),
        bdef("Post-Call Actions (run after the call ends)", "Connect to Google Drive", `Auto-uploads call assets (recordings, transcripts) to a connected Google Drive after the call.`, 24),
        bdef("Post-Call Actions (run after the call ends)", "Google Sheets – Add a Row", `Inserts collected call data as a new row in a Google Sheet (leads, tickets, callbacks, survey responses).`, 25),
        bdef("Post-Call Actions (run after the call ends)", "Redial", `Retries an unanswered/voicemail/failed call after a set delay, or moves the contact to another campaign for follow-up.`, 26),
        bdef("Post-Call Actions (run after the call ends)", "Campaign", `Adds the caller to a specific outbound campaign's queue once they hit this point — so missed calls, interested leads, or incomplete forms get a follow-up touchpoint.`, 27),
      ],
    },
    {
      id: "sec_howto", title: "How to Write a Proper QA Report", tag: "Reports", kind: "guide", order: 1,
      lastUpdated: BIBLE_NOW, updatedBy: "QA Team",
      intro: "QA reports must be specific, actionable, and tied to actual call behavior. A report should not just list outcomes. It should explain what happened, where the caller dropped off, what block or workflow area was involved, and what issue may need review.",
      items: [
        bitem("Format 1: Daily Call Review Summary", `Use this format when summarizing the biggest trends from a day of reviewed calls.

Required structure:

[Date] Call Review Summary

Biggest Drop-Off Points:

Customer Ended Calls
• List the main reasons callers ended the call.
• Include categories such as greeting hangup, abandoned call, not ready to book yet, user went unresponsive during qualification, unknown disqualification after caller path prompt, etc.

Max Duration Reached
• List calls where the agent or caller could not progress.
• Include whether repeated prompts, poor audio, transcription issues, or workflow loops contributed.

Phonely Ended Calls
• List cases where the system ended the call.
• Include whether the caller qualified, failed qualification, or was incorrectly routed.

Errors / Feedback / Observations:
• Explain what patterns QA noticed.
• Mention repeated issues across calls.
• Mention possible workflow, transcription, logic, transfer, or qualification issues.
• Include the impact of the issue.
• Example: "Poor audio quality caused repeated prompts and prevented the conversation from progressing."
• Example: "Qualified – No Buyer Found remains a contributor to lost opportunities despite successful qualification."`, 0),
        bitem("Format 2: Block-Based Drop-Off Report", `Use this format when analyzing where calls disconnected by workflow block.

Required structure:

QA Report [Date]

The highest volume of drop-offs occurred during [block name] with [number] calls

[Block / Outcome Name] ([count])
• Explain what happened.
• Explain what caller behavior caused the drop-off.
• Explain what agent behavior or workflow behavior contributed.
• Include examples if available.

Example categories:
• No response / silence
• Early drop / no engagement
• Misrouted / wrong provider or service
• Disconnection during eligibility questioning
• Distrust / legitimacy concern
• Repetition friction during personal information capture
• Preference for live agent / AI aversion
• Disconnection due to transfer wait time

Comparison Table:
Include a table comparing today's outcomes against the previous day when data is available.

Columns: Outcome | Previous Date Count | Previous Date % | Current Date Count | Current Date % | Difference

The report should clearly show whether outcomes improved, worsened, or stayed stable.`, 1),
      ],
    },
    {
      id: "sec_examples", title: "Good QA Report Examples", tag: "Examples", kind: "examples", order: 2,
      lastUpdated: BIBLE_NOW, updatedBy: "QA Team",
      intro: "Reference examples of well-written QA reports. Use the Copy button to reuse a format.",
      items: [
        bitem("Example 1: Daily Call Review Summary", `6/25/2026 Call Review Summary

Biggest Drop-Off Points:

Customer Ended Calls
• Greeting Hangup
• Abandoned Call
• Not Ready to Book Yet
• User Went Unresponsive During Qualification
• Unknown Disqualification After Caller Path Prompt

Max Duration Reached
• Poor audio quality caused repeated prompts and inability to progress the conversation
• User responses were transcribed incorrectly, resulting in repeated prompts

Phonely Ended Calls
• Qualified - No Buyer Found

Errors / Feedback / Observations:
• Poor audio quality was a significant contributor to call failures, causing repeated prompts and resulting in 3 calls reaching the maximum duration limit.
• One call reached maximum duration because user responses were repeatedly transcribed incorrectly, preventing the conversation from progressing.
• PPC Pest Control - call was unexpectedly ended/disqualified immediately after the caller path prompt, indicating a potential flow or qualification logic issue that should be investigated.
• "Qualified – No Buyer Found" remains a contributor to lost opportunities despite successful qualification.`, 0),
        bitem("Example 2: Block-Based Drop-Off Report", `QA Report June 24

The highest volume of drop-offs occurred during Q1 block with 11 calls

No response / silence (5)
• Users were unresponsive, leading to silence timeouts or disconnections after silence checks.

Early drop / no engagement (2)
• Users disconnected immediately after the greeting without engaging in the conversation.

Misrouted / wrong provider or service (3)
• Users intended to reach Medicaid or a specific contact and disconnected after realizing the mismatch.

Disconnection during eligibility questioning (1)
• Users showed interest but disengaged when asked about Medicare Part A and B.

3 calls disconnected during T1 block

Distrust / legitimacy concern (2)
• Users expressed skepticism or questioned legitimacy when asked for full name and disconnected when the agent could not directly answer eligibility questions.

Repetition friction during personal information capture (1)
• Agent had difficulty capturing DOB and repeatedly asked for it, leading to user frustration and disconnection.

1 call disconnected during Q2 block

Preference for live agent / AI aversion (1)
• User became frustrated with the review process and explicitly requested to speak with a live person, showing reluctance to continue interacting with an AI agent.

2 calls disconnected during Transfer Attempt 1 block

Disconnection due to transfer wait time (2)
• Users disconnected while the agent was in the process of transferring the call, likely due to impatience or perceived delay.`, 1),
      ],
    },
  ],
};

const DEFAULT_CONFIG = {
  categories: [
    { name: "Conversation Flow", description: "The agent sounds scripted, resets the conversation, repeats itself, or does not move naturally through the call." },
    { name: "Listening and Comprehension", description: "The agent misses clear caller input, asks for information already given, misunderstands the caller, or does not respond logically." },
    { name: "Name Capture Issues", description: "The agent fails to pick up the caller's name correctly, mishears the name, stores the wrong name, or keeps asking for the name even after it was provided." },
    { name: "Tone and Empathy", description: "The agent sounds too cold, too cheerful, too formal, dismissive, awkward, or emotionally mismatched to the caller." },
    { name: "Hallucination or Assumption", description: "The agent invents information, assumes missing values, adds details the caller did not provide, or answers without enough confirmation." },
    { name: "Variable and Data Capture", description: "The agent stores wrong values, fails to update values, captures invalid information, or continues with missing required data." },
    { name: "API and Tool Handling", description: "The agent treats failed, incomplete, or null API responses as successful instead of verifying or escalating." },
    { name: "Transfer and Escalation", description: "The agent transfers too early, refuses to transfer when needed, or gives an unnatural transfer message." },
    { name: "Timing and Interruptions", description: "The agent cuts off the caller, talks over them, responds too slowly, or leaves awkward pauses." },
    { name: "Policy or Workflow Issues", description: "The agent does not follow business rules, office rules, scheduling restrictions, eligibility rules, or the intended workflow." },
  ],
  severities: ["Critical", "Major", "Minor"],
  statuses: ["Open", "In Progress", "Monitoring", "Resolved", "Closed"],

/* ------------------------------- Utilities ------------------------------- */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function todayISO() { return new Date().toISOString().slice(0, 10); }
function nowISO() { return new Date().toISOString(); }
function esc(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function linkify(url) {
  if (!url) return "<span class='inline-note'>—</span>";
  const safe = esc(url); const label = url.length > 28 ? url.slice(0, 26) + "…" : url;
  if (/^https?:\/\//i.test(url)) return `<a href="${safe}" target="_blank" rel="noopener">${esc(label)}</a>`;
  return esc(url);
}
function sevClass(s) { const k = (s || "").toLowerCase(); if (k.startsWith("crit")) return "crit"; if (k.startsWith("maj")) return "major"; if (k.startsWith("min")) return "minor"; return "neutral"; }
function sevColor(s) { const k = sevClass(s); return k === "crit" ? "var(--crit)" : k === "major" ? "var(--warn)" : k === "minor" ? "var(--good)" : "var(--muted)"; }
function statusClass(s) { const k = (s || "").toLowerCase(); if (k.includes("open")) return "open"; if (k.includes("progress")) return "progress"; if (k.includes("monitor")) return "monitoring"; if (k.includes("resolv")) return "resolved"; if (k.includes("clos")) return "closed"; return "neutral"; }
function toast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("show"), 2200); }
function options(list, selected) { return (list || []).map(v => `<option value="${esc(v)}"${v === selected ? " selected" : ""}>${esc(v)}</option>`).join(""); }

/* --------------------------------- API ----------------------------------- */
async function api(path, { method = "GET", body } = {}) {
  const res = await fetch(path, {
    method,
    headers: { "content-type": "application/json", "x-qa-pass": pass || "" },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) {
    sessionStorage.removeItem("qa_pass"); pass = null;
    renderLogin("Your session ended. Please sign in again.");
    throw new Error("unauthorized");
  }
  if (!res.ok) { const j = await res.json().catch(() => ({})); throw new Error(j.error || ("HTTP " + res.status)); }
  return res.json().catch(() => ({}));
}
function normalizeConfig(cfg) {
  const c = cfg && typeof cfg === "object" ? cfg : {};
  return {
    categories: Array.isArray(c.categories) && c.categories.length ? c.categories : DEFAULT_CONFIG.categories,
    severities: c.severities || DEFAULT_CONFIG.severities,
    statuses: c.statuses || DEFAULT_CONFIG.statuses,
    owners: c.owners || DEFAULT_CONFIG.owners,
    environments: c.environments || DEFAULT_CONFIG.environments,
    frequencies: c.frequencies || DEFAULT_CONFIG.frequencies,
    bible: (c.bible && Array.isArray(c.bible.sections)) ? c.bible : DEFAULT_CONFIG.bible,
  };
}
async function loadData() {
  const d = await api("/api/data");
  state = { entries: d.entries || [], patterns: d.patterns || [], fixes: d.fixes || [], config: normalizeConfig(d.config) };
}
async function putItem(kind, item) {
  await api("/api/save", { method: "POST", body: { kind, item } });
  const arr = state[kind]; const i = arr.findIndex(x => x.id === item.id);
  if (i >= 0) arr[i] = item; else arr.unshift(item);
}
async function removeItemRemote(kind, id) {
  await api("/api/delete", { method: "POST", body: { kind, id } });
  state[kind] = state[kind].filter(x => x.id !== id);
}
async function persistConfig() { await api("/api/save", { method: "POST", body: { kind: "config", config: state.config } }); }

function renderLogin(errMsg) {
  document.getElementById("modalRoot").innerHTML = "";
  document.getElementById("app").innerHTML = `
    <div class="login-wrap"><div class="login-card">
      <h1><span class="dot"></span> AI Human Quality Tracker</h1>

    const val = input.value;
    btn.disabled = true; document.getElementById("loginErr").textContent = "";
    try {

function countBy(items, keyFn) {

}

}

function applyFilters(list) {
  return list.filter(x => {
    if (filters.from && (x.dateReviewed || "") < filters.from) return false;
    if (filters.to && (x.dateReviewed || "") > filters.to) return false;
    if (filters.reviewer && x.reviewer !== filters.reviewer) return false;
    if (filters.agent && x.agent !== filters.agent) return false;
    if (filters.environment && x.environment !== filters.environment) return false;
    if (filters.category && x.category !== filters.category) return false;
    if (filters.severity && x.severity !== filters.severity) return false;
    if (filters.status && x.status !== filters.status) return false;
    if (filters.q) { const hay = [x.behavior, x.humanWould, x.callerImpact, x.notes, x.recommendedFix, x.agent, x.reviewer].join(" ").toLowerCase(); if (!hay.includes(filters.q.toLowerCase())) return false; }
    return true;
  });
}
function sortEntries(list) {
  return [...list].sort((a, b) => { const av = (a[sortKey] || "").toString().toLowerCase(); const bv = (b[sortKey] || "").toString().toLowerCase(); if (av < bv) return -1 * sortDir; if (av > bv) return 1 * sortDir; return 0; });
}
function uniqVals(key) { return [...new Set(state.entries.map(x => x[key]).filter(Boolean))].sort(); }
function viewTracker() {

function csvCell(v) { const s = String(v == null ? "" : v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; }
function exportCSV() {
  const cols = ["dateReviewed", "reviewer", "environment", "agent", "callLink", "timestamp", "category", "behavior", "humanWould", "callerImpact", "severity", "frequency", "status", "owner", "recommendedFix", "notes"];
  const headers = ["Date Reviewed", "Reviewer Name", "Environment", "Agent Name", "Call Link", "Timestamp", "Issue Category", "Specific Behavior Observed", "What a Human Would Have Done", "Caller Impact", "Severity", "Frequency", "Status", "Owner", "Recommended Fix", "Notes"];
  const list = activeTab === "tracker" ? sortEntries(applyFilters(state.entries)) : state.entries;
  const lines = [headers.join(",")]; list.forEach(x => lines.push(cols.map(c => csvCell(x[c])).join(",")));
  download("ai_human_quality_tracker_" + todayISO() + ".csv", lines.join("\n"), "text/csv");
  toast("Exported " + list.length + " rows.");
}
function exportJSON() { download("ai_human_quality_tracker_backup_" + todayISO() + ".json", JSON.stringify({ entries: state.entries, patterns: state.patterns, fixes: state.fixes, config: state.config }, null, 2), "application/json"); }
function importJSON(ev) {
  const file = ev.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = async () => {
    let p; try { p = JSON.parse(String(r.result)); } catch { toast("Invalid JSON file."); return; }
    if (!confirm("Import will ADD or UPDATE entries for the whole team. Continue?")) return;
    try {
      if (p.config && typeof p.config === "object") { state.config = normalizeConfig(p.config); await persistConfig(); }
      for (const kind of ["entries", "patterns", "fixes"]) {
        for (const it of (p[kind] || [])) { if (!it.id) it.id = uid(); await putItem(kind, it); }
      }
      render(); toast("Import complete.");
    } catch (e) { if (e.message !== "unauthorized") toast("Import failed: " + e.message); }
  };
  r.readAsText(file);
}
function download(name, content, type) {
  const blob = new Blob([content], { type }); const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

let bibleActiveId = null, bibleEdit = false, bibleQuery = "", bibleExpanded = {}, _pendingConfirm = null;

function bibleData() { const b = state.config.bible; return (b && Array.isArray(b.sections)) ? b : { sections: [] }; }
function bibleSections() { return [...bibleData().sections].sort((a, b) => (a.order || 0) - (b.order || 0)); }
function bibleItems(sec) { return [...(sec.items || [])].sort((a, b) => (a.order || 0) - (b.order || 0)); }
function touchSection(sec) { if (sec) sec.lastUpdated = nowISO(); }
function fmtDate(iso) { if (!iso) return ""; const d = new Date(iso); if (isNaN(d)) return ""; return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" }); }

function renderRich(text) {
  const lines = String(text == null ? "" : text).split("\n");
  let html = "", inList = false;
  const closeList = () => { if (inList) { html += "</ul>"; inList = false; } };
  for (const raw of lines) {
    const line = raw.trim();
    if (line.startsWith("•") || line.startsWith("- ")) {
      if (!inList) { html += "<ul class='kb-ul'>"; inList = true; }
      html += "<li>" + esc(line.replace(/^•\s?/, "").replace(/^- /, "")) + "</li>";
    } else if (!line) {
      closeList(); html += "<div class='kb-sp'></div>";
    } else if (/:$/.test(line)) {
      closeList(); html += "<div class='kb-sub'>" + esc(line) + "</div>";
    } else {
      closeList(); html += "<p class='kb-p'>" + esc(line) + "</p>";
    }
  }
  closeList();
  return html || "<span class='inline-note'>—</span>";
}

function viewBible() {
  const secs = bibleSections();
  if (bibleActiveId == null || !secs.find(s => s.id === bibleActiveId)) bibleActiveId = secs.length ? secs[0].id : null;
  const q = bibleQuery.trim().toLowerCase();
  const side = `<div class="kb-side">
      <div class="kb-side-title">Sections</div>
      ${secs.map((s, idx) => `<div class="kb-nav-item ${!q && s.id === bibleActiveId ? "active" : ""}" onclick="selectBibleSection('${s.id}')">

  else { const sec = secs.find(s => s.id === bibleActiveId); main = sec ? bibleSectionView(sec) : `<div class="empty"><div class="big">No sections yet</div>${bibleEdit ? "<div>Use “+ Add Section”.</div>" : ""}</div>`; }

function bibleSearchResults(q) {
  const out = [];
  bibleSections().forEach(s => bibleItems(s).forEach(it => {
    const hay = [it.title, it.body, it.group, s.title, s.tag].filter(Boolean).join(" ").toLowerCase();
    if (hay.includes(q)) out.push({ s, it });
  }));
  if (!out.length) return `<div class="empty"><div class="big">No matches for “${esc(bibleQuery)}”</div><div>Try a block name or keyword.</div></div>`;
  return `<div class="kb-sec-head"><h3 style="margin:0">Search results</h3><span class="kb-tag">${out.length} match${out.length === 1 ? "" : "es"}</span></div>` +
    out.map(({ s, it }) => `<div class="kb-result-sec">${esc(s.title)}</div>${bibleItemCard(s, it)}`).join("");
}

function bindBibleControls() {
  const s = document.getElementById("bibleSearch");
  if (s) s.addEventListener("input", () => {
    bibleQuery = s.value; render();
    const n = document.getElementById("bibleSearch"); if (n) { n.focus(); n.setSelectionRange(n.value.length, n.value.length); }
  });
}

function selectBibleSection(id) { bibleActiveId = id; bibleQuery = ""; render(); }
function toggleBible(id) { bibleExpanded[id] = !bibleExpanded[id]; render(); }
function toggleBibleEdit() { bibleEdit = !bibleEdit; render(); toast(bibleEdit ? "Edit mode on." : "Edit mode off."); }
function copyBible(id) {
  let body = ""; bibleSections().forEach(s => { const it = (s.items || []).find(x => x.id === id); if (it) body = it.body; });
  if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(body).then(() => toast("Copied to clipboard.")).catch(() => toast("Copy failed."));
  else toast("Copy not supported in this browser.");
}

function moveBibleSection(id, dir) {
  const secs = bibleSections(); const i = secs.findIndex(s => s.id === id); const j = i + dir;
  if (i < 0 || j < 0 || j >= secs.length) return;
  const a = secs[i], b = secs[j], ao = a.order || 0, bo = b.order || 0; a.order = bo; b.order = ao;
  syncConfig("Order updated.");
}
function moveBibleItem(sectionId, itemId, dir) {
  const sec = bibleData().sections.find(s => s.id === sectionId); if (!sec) return;
  let list = bibleItems(sec);
  if (sec.kind === "definitions") { const grp = (list.find(x => x.id === itemId) || {}).group || ""; list = list.filter(x => (x.group || "") === grp); }
  const i = list.findIndex(x => x.id === itemId); const j = i + dir;
  if (i < 0 || j < 0 || j >= list.length) return;
  const a = list[i], b = list[j], ao = a.order || 0, bo = b.order || 0; a.order = bo; b.order = ao;
  touchSection(sec); syncConfig("Order updated.");
}

function openBibleSectionModal(id) {
  const sec = id ? bibleData().sections.find(s => s.id === id) : { title: "", tag: "", intro: "", kind: "guide", updatedBy: "" };
  if (!sec) return;
  const kinds = [["guide", "Text / Guide"], ["definitions", "Definitions (grouped)"], ["examples", "Examples"]];
  document.getElementById("modalRoot").innerHTML = `<div class="overlay" id="overlay"><div class="modal" style="max-width:640px">
      <div class="modal-head"><h3>${id ? "Edit" : "Add"} Section</h3><div style="flex:1"></div><button class="ghost" onclick="closeModal()">✕</button></div>
      <div class="modal-body"><div class="form-grid">
        <label class="field span2"><span>Title</span><input id="bs_title" value="${esc(sec.title)}" placeholder="e.g. Block Definitions"></label>
        <label class="field"><span>Tag</span><input id="bs_tag" value="${esc(sec.tag || "")}" placeholder="e.g. Reports"></label>
        <label class="field span3"><span>Type</span><select id="bs_kind">${kinds.map(([v, l]) => `<option value="${v}"${sec.kind === v ? " selected" : ""}>${l}</option>`).join("")}</select></label>
        <label class="field span3"><span>Intro (optional)</span><textarea id="bs_intro" placeholder="Short description shown under the title">${esc(sec.intro || "")}</textarea></label>
        <label class="field span3"><span>Updated by (optional)</span><input id="bs_by" value="${esc(sec.updatedBy || "")}" placeholder="Your name or initials"></label>
      </div></div>
      <div class="modal-foot"><button onclick="closeModal()">Cancel</button><button class="primary" id="bsSaveBtn" onclick="saveBibleSection(${id ? "'" + id + "'" : "null"})">Save</button></div>
    </div></div>`;
}
async function saveBibleSection(id) {
  const g = k => (document.getElementById("bs_" + k) || {}).value;
  const title = (g("title") || "").trim(); if (!title) { toast("Section needs a title."); return; }
  if (!state.config.bible || !Array.isArray(state.config.bible.sections)) state.config.bible = { sections: [] };
  const data = state.config.bible;
  if (id) { const s = data.sections.find(x => x.id === id); if (s) { s.title = title; s.tag = (g("tag") || "").trim(); s.kind = g("kind"); s.intro = (g("intro") || "").trim(); s.updatedBy = (g("by") || "").trim(); s.lastUpdated = nowISO(); } }
  else {
    const order = data.sections.length ? Math.max(...data.sections.map(s => s.order || 0)) + 1 : 0;
    const ns = { id: "sec_" + uid(), title, tag: (g("tag") || "").trim(), kind: g("kind"), intro: (g("intro") || "").trim(), updatedBy: (g("by") || "").trim(), order, lastUpdated: nowISO(), items: [] };
    data.sections.push(ns); bibleActiveId = ns.id;
  }
  closeModal(); await syncConfig("Section saved.");
}

function openBibleItemModal(sectionId, id) {
  const sec = bibleData().sections.find(s => s.id === sectionId); if (!sec) return;
  const it = id ? (sec.items || []).find(x => x.id === id) : { title: "", body: "", group: "", updatedBy: "" };
  if (!it) return;
  const isDef = sec.kind === "definitions";
  const groups = [...new Set((sec.items || []).map(x => x.group).filter(Boolean))];
  document.getElementById("modalRoot").innerHTML = `<div class="overlay" id="overlay"><div class="modal" style="max-width:720px">
      <div class="modal-head"><h3>${id ? "Edit" : "Add"} ${isDef ? "Definition" : "Item"}</h3><div style="flex:1"></div><button class="ghost" onclick="closeModal()">✕</button></div>
      <div class="modal-body"><div class="form-grid">
        <label class="field ${isDef ? "span2" : "span3"}"><span>${isDef ? "Block name" : "Title"}</span><input id="bi_title" value="${esc(it.title)}" placeholder="${isDef ? "e.g. Start Flow" : "e.g. Format 1: Daily Call Review Summary"}"></label>
        ${isDef ? `<label class="field"><span>Group</span><input id="bi_group" list="bi_groups" value="${esc(it.group || "")}" placeholder="e.g. Core Blocks"><datalist id="bi_groups">${groups.map(x => `<option value="${esc(x)}">`).join("")}</datalist></label>` : ""}
        <label class="field span3"><span>Content</span><textarea id="bi_body" style="min-height:220px" placeholder="Use • or - at the start of a line for bullets. Blank lines separate paragraphs.">${esc(it.body)}</textarea>
          <div class="hint">Tip: start a line with • or "- " for bullets. A line ending with ":" shows as a sub-heading.</div></label>
        <label class="field span3"><span>Updated by (optional)</span><input id="bi_by" value="${esc(it.updatedBy || "")}" placeholder="Your name or initials"></label>
      </div></div>
      <div class="modal-foot"><button onclick="closeModal()">Cancel</button><button class="primary" id="biSaveBtn" onclick="saveBibleItem('${sectionId}',${id ? "'" + id + "'" : "null"})">Save</button></div>
    </div></div>`;
}
async function saveBibleItem(sectionId, id) {
  const sec = bibleData().sections.find(s => s.id === sectionId); if (!sec) return;
  const g = k => (document.getElementById("bi_" + k) || {}).value;
  const title = (g("title") || "").trim(); if (!title) { toast("Please enter a title."); return; }
  if (!Array.isArray(sec.items)) sec.items = [];
  if (id) { const it = sec.items.find(x => x.id === id); if (it) { it.title = title; it.body = g("body") || ""; if (sec.kind === "definitions") it.group = (g("group") || "").trim() || "General"; it.updatedBy = (g("by") || "").trim(); it.lastUpdated = nowISO(); } }
  else {
    const order = sec.items.length ? Math.max(...sec.items.map(x => x.order || 0)) + 1 : 0;
    const ni = { id: (sec.kind === "definitions" ? "bd_" : "bi_") + uid(), title, body: g("body") || "", order, updatedBy: (g("by") || "").trim(), lastUpdated: nowISO() };
    if (sec.kind === "definitions") ni.group = (g("group") || "").trim() || "General";
    sec.items.push(ni); bibleExpanded[ni.id] = true;
  }
  touchSection(sec); closeModal(); await syncConfig("Saved.");
}

function openConfirmModal(message, fn) {
  _pendingConfirm = fn;
  document.getElementById("modalRoot").innerHTML = `<div class="overlay" id="overlay"><div class="modal" style="max-width:440px">
      <div class="modal-head"><h3>Please confirm</h3><div style="flex:1"></div><button class="ghost" onclick="cancelConfirm()">✕</button></div>
      <div class="modal-body"><p style="margin:0">${esc(message)}</p></div>
      <div class="modal-foot"><button onclick="cancelConfirm()">Cancel</button><button class="danger" onclick="runConfirm()">Delete</button></div>
    </div></div>`;
}
function cancelConfirm() { _pendingConfirm = null; closeModal(); }
function runConfirm() { const f = _pendingConfirm; _pendingConfirm = null; closeModal(); if (f) f(); }
function confirmDeleteBibleSection(id) { const s = bibleData().sections.find(x => x.id === id); openConfirmModal(`Delete the section “${s ? s.title : ""}” and all of its content? This cannot be undone.`, () => deleteBibleSection(id)); }
function confirmDeleteBibleItem(sectionId, itemId) { const sec = bibleData().sections.find(s => s.id === sectionId); const it = sec ? (sec.items || []).find(x => x.id === itemId) : null; openConfirmModal(`Delete “${it ? it.title : ""}”? This cannot be undone.`, () => deleteBibleItem(sectionId, itemId)); }
async function deleteBibleSection(id) {
  if (!state.config.bible || !Array.isArray(state.config.bible.sections)) return;
  state.config.bible.sections = state.config.bible.sections.filter(s => s.id !== id);
  if (bibleActiveId === id) bibleActiveId = null;
  await syncConfig("Section deleted.");
}
async function deleteBibleItem(sectionId, itemId) {
  const sec = bibleData().sections.find(s => s.id === sectionId);
  if (sec) { sec.items = (sec.items || []).filter(x => x.id !== itemId); touchSection(sec); }
  await syncConfig("Deleted.");
}

/* -------------------------------- Bootstrap ------------------------------- */
async function boot() {
  document.getElementById("app").innerHTML = `<div class="loading">Loading…</div>`;
  try {
    await loadData();
    mountShell();
    render();
  } catch (e) {
    if (e.message === "unauthorized") return;
    document.getElementById("app").innerHTML = `<div class="loading">Could not load data.<br><br>${esc(e.message)}<br><br><button onclick="location.reload()">Retry</button></div>`;
  }
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
document.getElementById("modalRoot").addEventListener("click", e => { if (e.target.id === "overlay") closeModal(); });
window.addEventListener("focus", () => { if (pass && !document.getElementById("overlay")) refresh(); });

// expose handlers used by inline onclick
Object.assign(window, { openEntryModal, saveEntry, deleteEntry, closeModal, openPatternModal, savePattern, deletePattern, openFixModal, saveFix, deleteFix, addCategory, removeCategory, saveCategories, addListItem, removeListItem, saveList, exportCSV, exportJSON, importJSON, loadSampleData,
  selectBibleSection, toggleBible, toggleBibleEdit, copyBible, moveBibleSection, moveBibleItem, openBibleSectionModal, saveBibleSection, openBibleItemModal, saveBibleItem, confirmDeleteBibleSection, confirmDeleteBibleItem, deleteBibleSection, deleteBibleItem, openConfirmModal, runConfirm, cancelConfirm });

if (pass) boot(); else renderLogin();
</script>
